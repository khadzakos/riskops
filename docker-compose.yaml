services:
  db-migrate:
    profiles: [all, infra, apps, airflow]
    image: migrate/migrate:v4
    volumes:
      - ./infra/db/migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://riskops:riskops@db:5432/riskops?sslmode=disable"
      - "up"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  db:
    profiles: [all, infra]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: riskops
      POSTGRES_USER: riskops
      POSTGRES_PASSWORD: riskops
    ports:
      - "6432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    profiles: [all, infra, apps]
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      # KRaft mode — no ZooKeeper
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15

  minio:
    profiles: [all, infra, mlflow]
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    environment:
      MINIO_ROOT_USER: riskops
      MINIO_ROOT_PASSWORD: riskops123
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    profiles: [all, infra, mlflow]
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 riskops riskops123 &&
        mc mb --ignore-existing local/mlflow-artifacts &&
        echo 'MinIO buckets ready'
      "

  # ── MLflow ───────────────────────────────────────────────────
  mlflow:
    profiles: [all, mlflow, infra]
    image: ghcr.io/mlflow/mlflow:latest
    command: >
      sh -c "python -m pip install --no-cache-dir -q psycopg2-binary boto3 && mlflow server
      --host 0.0.0.0
      --port 3000
      --allowed-hosts mlflow,mlflow:3000,localhost,localhost:3000,127.0.0.1,127.0.0.1:3000
      --backend-store-uri postgresql://riskops:riskops@db:5432/riskops?options=-csearch_path%3Dmlflow
      --default-artifact-root s3://mlflow-artifacts/"
    ports:
      - "3000:3000"
    environment:
      MLFLOW_TRACKING_URI: http://localhost:3000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: riskops
      AWS_SECRET_ACCESS_KEY: riskops123
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  # ── Airflow ───────────────────────────────────────────────────
  airflow-init:
    profiles: [all, airflow, infra]
    build:
      context: .
      dockerfile: infra/airflow/Dockerfile
    environment: &airflow-env
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://riskops:riskops@db:5432/riskops
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__WEBSERVER__WORKERS: "1"
      AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: "300"
      AIRFLOW__WEBSERVER__WORKER_REFRESH_INTERVAL: "0"
      AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: "300"
      GUNICORN_CMD_ARGS: "--timeout 300 --workers 1"
      DATABASE_URL: postgresql://riskops:riskops@db:5432/riskops
      MLFLOW_TRACKING_URI: http://mlflow:3000
      AWS_ACCESS_KEY_ID: riskops
      AWS_SECRET_ACCESS_KEY: riskops123
      AWS_ENDPOINT_URL: http://minio:9000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      PORTFOLIO_SERVICE_URL: http://portfolio-service:8082
      MARKET_DATA_SERVICE_URL: http://market-data-service:8083
      TRAINING_SERVICE_URL: http://training-service:8084
      INFERENCE_SERVICE_URL: http://inference-service:8085
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ./infra/airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -lc "
      airflow db migrate &&
      airflow users create --username \"$${_AIRFLOW_WWW_USER_USERNAME}\" --password \"$${_AIRFLOW_WWW_USER_PASSWORD}\" --firstname Admin --lastname User --role Admin --email admin@example.com
      "

  airflow-webserver:
    profiles: [all, airflow, infra]
    build:
      context: .
      dockerfile: infra/airflow/Dockerfile
    environment: *airflow-env
    ports:
      - "8080:8080"
    volumes:
      - ./infra/airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  airflow-scheduler:
    profiles: [all, airflow, infra]
    build:
      context: .
      dockerfile: infra/airflow/Dockerfile
    environment: *airflow-env
    volumes:
      - ./infra/airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler

  # ── Go Services ──────────────────────────────────────────────
  gateway:
    profiles: [all, apps]
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      LOG_LEVEL: info
      PORTFOLIO_SERVICE_URL: http://portfolio-service:8082
      MARKET_DATA_SERVICE_URL: http://market-data-service:8083
      INFERENCE_SERVICE_URL: http://inference-service:8085
      TRAINING_SERVICE_URL: http://training-service:8084
    depends_on:
      - portfolio-service
      - market-data-service
      - inference-service
      - training-service

  portfolio-service:
    profiles: [all, apps]
    build:
      context: .
      dockerfile: apps/portfolio-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      PORT: "8082"
      DATABASE_URL: postgresql://riskops:riskops@db:5432/riskops
      LOG_LEVEL: info
      KAFKA_BROKERS: kafka:9092
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy

  market-data-service:
    profiles: [all, apps]
    build:
      context: .
      dockerfile: apps/market-data-service/Dockerfile
    ports:
      - "8083:8083"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      PORT: "8083"
      DATABASE_URL: postgresql://riskops:riskops@db:5432/riskops
      LOG_LEVEL: info
      KAFKA_BROKERS: kafka:9092
      FRED_API_KEY: "e531b375faba60b9228efde0901f08cc"
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ── Python Services ─────────────
  training-service:
    profiles: [all, apps]
    build:
      context: ./apps/training-service
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      PORT: "8084"
      LOG_LEVEL: info
      DATABASE_URL: postgresql://riskops:riskops@db:5432/riskops
      MLFLOW_TRACKING_URI: http://mlflow:3000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: riskops
      AWS_SECRET_ACCESS_KEY: riskops123
      KAFKA_BROKERS: kafka:9092
      KAFKA_CONSUMER_GROUP: training-service
      KAFKA_TOPIC_MARKET_DATA: market.data.ingested
      KAFKA_TOPIC_MODEL_TRAINED: model.trained
      DEFAULT_LOOKBACK_DAYS: "252"
      DEFAULT_ALPHA: "0.99"
      DEFAULT_HORIZON_DAYS: "1"
      MONTE_CARLO_SIMULATIONS: "10000"
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mlflow:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  inference-service:
    profiles: [all, apps]
    build:
      context: ./apps/inference-service
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:
      PORT: "8085"
      LOG_LEVEL: info
      DATABASE_URL: postgresql://riskops:riskops@db:5432/riskops
      MLFLOW_TRACKING_URI: http://mlflow:3000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: riskops
      AWS_SECRET_ACCESS_KEY: riskops123
      KAFKA_BROKERS: kafka:9092
      KAFKA_CONSUMER_GROUP: inference-service
      KAFKA_TOPIC_PORTFOLIO_UPDATED: portfolio.updated
      KAFKA_TOPIC_MODEL_TRAINED: model.trained
      DEFAULT_ALPHA: "0.99"
      DEFAULT_HORIZON_DAYS: "1"
      DEFAULT_LOOKBACK_DAYS: "252"
      MONTE_CARLO_SIMULATIONS: "10000"
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mlflow:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  # ── Frontend ──────────────────────────────────────────────────
  frontend:
    profiles: [all, apps]
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    ports:
      # Только localhost: снаружи фронт доступен через сервис caddy (:80 / :443)
      - "127.0.0.1:3002:3000"
    environment:
      API_URL: http://gateway:8081
      NEXT_PUBLIC_API_URL: http://localhost:8081
    depends_on:
      - gateway
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  caddy:
    profiles: [all, infra]
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      frontend:
        condition: service_healthy

  # One-shot OpenAPI → Go (api.gen.go). Usage: docker compose --profile tools run --rm oapi-gen
  oapi-gen:
    profiles: [tools]
    image: golang:1.24-bookworm
    working_dir: /work
    volumes:
      - .:/work
    environment:
      GOTOOLCHAIN: auto
    entrypoint: ["/bin/sh", "-eux", "-c"]
    command:
      - |
        go run github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.4.1 \
          --config api/oapi-codegen.yaml -package api \
          -o apps/portfolio-service/internal/api/api.gen.go \
          apps/portfolio-service/openapi.yaml
        go run github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.4.1 \
          --config api/oapi-codegen.yaml -package api \
          -o apps/market-data-service/internal/api/api.gen.go \
          apps/market-data-service/openapi.yaml

  pipelines:
    profiles: [all, apps]
    build:
      context: ./apps/pipelines
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://riskops:riskops@db:5432/riskops
      MLFLOW_TRACKING_URI: http://mlflow:3000
    depends_on:
      db:
        condition: service_healthy
      mlflow:
        condition: service_started
    entrypoint: ["python", "-m", "riskops_pipelines"]

  # ── Observability ──────────────────────────────────
  prometheus:
    profiles: [all, observability]
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles

  grafana:
    profiles: [all, observability]
    image: grafana/grafana:11.3.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  minio_data:
  mlflow_artifacts:
  airflow_logs:
  grafana_data:
  caddy_data:
