services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: riskops
      POSTGRES_USER: riskops
      POSTGRES_PASSWORD: riskops
    ports:
      - "6432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep -q Mode || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    environment:
      MINIO_ROOT_USER: riskops
      MINIO_ROOT_PASSWORD: riskops123
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 riskops riskops123 &&
        mc mb --ignore-existing local/mlflow-artifacts &&
        mc mb --ignore-existing local/riskops-models &&
        echo 'MinIO buckets ready'
      "

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    command: >
      sh -c "python -m pip install --no-cache-dir -q psycopg2-binary boto3 && mlflow server
      --host 0.0.0.0
      --port 3000
      --allowed-hosts mlflow,mlflow:3000,localhost,localhost:3000,127.0.0.1,127.0.0.1:3000
      --backend-store-uri postgresql://riskops:riskops@db:5432/riskops?options=-csearch_path%3Dmlflow
      --default-artifact-root s3://mlflow-artifacts/"
    ports:
      - "3000:3000"
    environment:
      MLFLOW_TRACKING_URI: http://localhost:3000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: riskops
      AWS_SECRET_ACCESS_KEY: riskops123
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  airflow-init:
    image: apache/airflow:2.9.3
    environment: &airflow-env
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://riskops:riskops@db:5432/riskops
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      DATABASE_URL: postgresql://riskops:riskops@db:5432/riskops
      MLFLOW_TRACKING_URI: http://mlflow:3000
      AWS_ACCESS_KEY_ID: riskops
      AWS_SECRET_ACCESS_KEY: riskops123
      AWS_ENDPOINT_URL: http://minio:9000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      MARKET_DATA_SERVICE_URL: http://market-data-service:8083
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ./infra/airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -lc "
      airflow db migrate &&
      airflow users create --username \"$${_AIRFLOW_WWW_USER_USERNAME}\" --password \"$${_AIRFLOW_WWW_USER_PASSWORD}\" --firstname Admin --lastname User --role Admin --email admin@example.com
      "

  airflow-webserver:
    image: apache/airflow:2.9.3
    environment: *airflow-env
    ports:
      - "8080:8080"
    volumes:
      - ./infra/airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      market-data-service:
        condition: service_started
    command: webserver
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  airflow-scheduler:
    image: apache/airflow:2.9.3
    environment: *airflow-env
    volumes:
      - ./infra/airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      market-data-service:
        condition: service_started
    command: scheduler

  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./ui:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://localhost:8081
    depends_on:
      - gateway

  # ── Go Services ──────────────────────────────────────────────

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      LOG_LEVEL: info
      PORTFOLIO_SERVICE_URL: http://portfolio-service:8082
      MARKET_DATA_SERVICE_URL: http://market-data-service:8083
      INFERENCE_SERVICE_URL: http://inference-service:8085
      TRAINING_SERVICE_URL: http://training-service:8084
    depends_on:
      - portfolio-service
      - market-data-service

  portfolio-service:
    build:
      context: .
      dockerfile: apps/portfolio-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      PORT: "8082"
      DATABASE_URL: postgresql://riskops:riskops@db:5432/riskops
      LOG_LEVEL: info
      KAFKA_BROKERS: kafka:29092
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy

  market-data-service:
    build:
      context: .
      dockerfile: apps/market-data-service/Dockerfile
    ports:
      - "8083:8083"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      PORT: "8083"
      DATABASE_URL: postgresql://riskops:riskops@db:5432/riskops
      LOG_LEVEL: info
      KAFKA_BROKERS: kafka:29092
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ── Python Services ─────────────

  training-service:
    build:
      context: ./apps/training-service
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      PORT: "8084"
      LOG_LEVEL: info
      DATABASE_URL: postgresql://riskops:riskops@db:5432/riskops
      MLFLOW_TRACKING_URI: http://mlflow:3000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: riskops
      AWS_SECRET_ACCESS_KEY: riskops123
      S3_BUCKET_MODELS: riskops-models
      KAFKA_BROKERS: kafka:29092
      KAFKA_CONSUMER_GROUP: training-service
      KAFKA_TOPIC_MARKET_DATA: market.data.ingested
      KAFKA_TOPIC_MODEL_TRAINED: model.trained
      DEFAULT_LOOKBACK_DAYS: "252"
      DEFAULT_ALPHA: "0.99"
      DEFAULT_HORIZON_DAYS: "1"
      MONTE_CARLO_SIMULATIONS: "10000"
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mlflow:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  pipelines:
    build:
      context: ./apps/pipelines
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://riskops:riskops@db:5432/riskops
      MLFLOW_TRACKING_URI: http://mlflow:3000
    depends_on:
      db:
        condition: service_healthy
      mlflow:
        condition: service_started
    entrypoint: ["python", "-m", "riskops_pipelines"]

  # ── Observability ──────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  minio_data:
  mlflow_artifacts:
  airflow_logs:
  grafana_data:
