name: Deploy to VM (selective)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-vm-main
  cancel-in-progress: true

jobs:
  compute-services:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.map.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute changed files
        id: diff
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          if [[ "${BEFORE}" == "0000000000000000000000000000000000000000" ]]; then
            BEFORE="$(git rev-parse "${AFTER}^" 2>/dev/null || true)"
          fi
          if [[ -z "${BEFORE}" ]]; then
            git fetch origin main --depth=2
            BEFORE="$(git rev-parse origin/main^ 2>/dev/null || true)"
          fi
          if [[ -z "${BEFORE}" ]]; then
            echo "Could not resolve before SHA; listing only current tree (first deploy)." >&2
            git ls-files -z | tr '\0' '\n' > changed_files.txt
          else
            git diff --name-only "${BEFORE}" "${AFTER}" > changed_files.txt
          fi
          echo "Changed files:"
          cat changed_files.txt

      - name: Map changes to compose services
        id: map
        run: |
          set -euo pipefail
          chmod +x scripts/ci/map_changes_to_compose_services.sh
          SERVICES="$(scripts/ci/map_changes_to_compose_services.sh changed_files.txt | tr -d '\r')"
          echo "services=${SERVICES}" >> "${GITHUB_OUTPUT}"
          echo "Compose redeploy targets: [${SERVICES:-<none — git sync only>}]"

  deploy-vm:
    needs: compute-services
    runs-on: ubuntu-latest
    steps:
      - name: Sync repo, run migrations, redeploy changed services
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_SERVICES: ${{ needs.compute-services.outputs.services }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          envs: DEPLOY_SERVICES
          script_stop: true
          script: |
            set -euo pipefail
            SERVICES="${DEPLOY_SERVICES:-}"
            cd "${{ secrets.VM_DEPLOY_PATH }}"

            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            # Always regenerate OpenAPI Go stubs so *.gen.go files match the
            # current openapi.yaml specs before any Go service is compiled.
            docker compose --profile tools run --rm -T oapi-gen

            # Always run migrations after pulling latest code
            docker compose run --rm -T db-migrate

            if [ -z "${SERVICES}" ]; then
              echo "No mapped compose services; git sync + codegen + migrations done."
              exit 0
            fi

            if [ "${SERVICES}" = "ALL_APPS" ]; then
              docker compose --profile apps --profile airflow --profile observability up -d --build
              exit 0
            fi

            PROFILES="--profile apps"
            if echo "${SERVICES}" | grep -qE "prometheus|grafana"; then
              PROFILES="${PROFILES} --profile observability"
            fi
            if echo "${SERVICES}" | grep -q "airflow"; then
              PROFILES="${PROFILES} --profile airflow"
            fi

            docker compose ${PROFILES} up -d --build ${SERVICES}
